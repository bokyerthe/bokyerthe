<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="auto" role="img" aria-label="System Online — pulse signal">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="6" in="SourceGraphic" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ekg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="0.1" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="0.9" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="120" fill="transparent"/>

  <!-- Radar pulse rings -->
  <g transform="translate(80,60)">
    <circle cx="0" cy="0" r="6" fill="url(#core)"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00e5ff" stroke-width="1.2" filter="url(#glow)">
      <animate attributeName="r" values="6;42" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00e5ff" stroke-width="1.2" filter="url(#glow)">
      <animate attributeName="r" values="6;42" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00e5ff" stroke-width="1.2" filter="url(#glow)">
      <animate attributeName="r" values="6;42" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#00e5ff" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Status text -->
  <text x="140" y="58" font-family="ui-monospace,monospace" font-size="20" fill="#00e5ff" filter="url(#glow)" letter-spacing="3">SYSTEM ONLINE</text>
  <text x="140" y="78" font-family="ui-monospace,monospace" font-size="11" fill="#5d7080" letter-spacing="2">vps · mikrotik · cloudflare · mail</text>

  <!-- EKG / heartbeat line -->
  <polyline points="0,60 80,60 100,60 110,40 120,80 130,50 140,70 160,60 240,60 260,60 270,40 280,80 290,50 300,70 320,60 400,60 420,60 430,40 440,80 450,50 460,70 480,60 600,60"
            fill="none" stroke="url(#ekg)" stroke-width="1.5" filter="url(#glow)" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.6s" repeatCount="indefinite"/>
  </polyline>

  <!-- Blinking cursor dot -->
  <circle cx="570" cy="60" r="3" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.06s" repeatCount="indefinite"/>
  </circle>
</svg>
